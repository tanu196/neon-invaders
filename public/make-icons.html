<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>アイコン作成</title>
<style>
  body{background:#05060f;color:#fff;font-family:sans-serif;text-align:center;padding:24px}
  button,label.file{display:inline-block;padding:12px 20px;margin:6px;border:none;border-radius:20px;background:#2ef2ff;color:#02030a;font-weight:700;cursor:pointer}
  canvas{width:160px;height:160px;border-radius:24px;background:#05060f;margin:10px}
  p{font-size:14px;line-height:1.6;color:#cdd6ff}
  .hint{color:#8f9ac9;font-size:12px}
</style>
</head><body>
<h2>NEON INVADERS アイコン作成</h2>
<p>自分で作った画像を選ぶと、PWA用の <b>icon-192.png</b> と <b>icon-512.png</b> を作れます。<br>
画像を選ばない場合は、標準の宇宙船アイコンになります。</p>

<div>
  <label class="file">画像を選ぶ
    <input id="file" type="file" accept="image/*" hidden>
  </label>
</div>

<canvas id="c" width="512" height="512"></canvas><br>

<button onclick="dl(192)">icon-192.png を保存</button>
<button onclick="dl(512)">icon-512.png を保存</button>
<p class="hint">保存した2つのファイルを public/icons/ に置いてください。</p>

<script>
// 512pxのキャンバスにアイコンを描き、そこから各サイズのPNGを書き出す
const cv = document.getElementById("c");
const x = cv.getContext("2d");

// 標準の宇宙船アイコン（画像を選ばなかったとき用）
function paintDefault(){
  x.fillStyle = "#05060f"; x.fillRect(0,0,512,512);
  x.fillStyle = "#aab8ff";
  for(let i=0;i<60;i++) x.fillRect(Math.random()*512, Math.random()*512, 2, 2);
  x.shadowColor = "#2ef2ff"; x.shadowBlur = 40; x.fillStyle = "#2ef2ff";
  x.beginPath(); x.moveTo(256,150); x.lineTo(150,380); x.lineTo(362,380); x.closePath(); x.fill();
  x.shadowBlur = 0;
}

// 選んだ画像を正方形いっぱいに描く（はみ出す分は中央基準でカット）
function paintImage(img){
  x.clearRect(0,0,512,512);
  x.fillStyle = "#05060f"; x.fillRect(0,0,512,512);
  const scale = Math.max(512/img.width, 512/img.height); // cover（余白なく埋める）
  const w = img.width*scale, h = img.height*scale;
  x.drawImage(img, (512-w)/2, (512-h)/2, w, h);
}

paintDefault();

// 画像が選ばれたらキャンバスに描画
document.getElementById("file").addEventListener("change", (e)=>{
  const f = e.target.files[0]; if(!f) return;
  const img = new Image();
  img.onload = ()=> paintImage(img);
  img.src = URL.createObjectURL(f);
});

// 指定サイズに縮小してPNGとして保存
function dl(size){
  const t = document.createElement("canvas"); t.width = size; t.height = size;
  t.getContext("2d").drawImage(cv, 0, 0, size, size);
  const a = document.createElement("a");
  a.download = "icon-" + size + ".png";
  a.href = t.toDataURL("image/png");
  a.click();
}
</script>
</body></html>
