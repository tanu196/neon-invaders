"use strict";
/* =============================================================
   NEON INVADERS  オンライン対戦サーバー（最小構成）
   - Express で public フォルダを配信
   - Socket.IO でルーム作成 / 参加 / 状態同期を行う
   初心者向けに、やっていることをコメントで説明しています。
   ============================================================= */

const express = require("express");
const http = require("http");
const path = require("path");
const { Server } = require("socket.io");

const app = express();
const server = http.createServer(app);
const io = new Server(server);

// public フォルダの中身（index.html など）をそのまま配信する
app.use(express.static(path.join(__dirname, "public")));

/* -------------------------------------------------------------
   ルーム管理
   rooms = { "AB12": { players: [socketId1, socketId2] } } のような形
   ------------------------------------------------------------- */
const rooms = {};

// 4文字のルームIDをランダムに作る（例: "K7QX"）
function makeRoomId(){
  return Math.random().toString(36).substring(2, 6).toUpperCase();
}

io.on("connection", (socket) => {
  console.log("接続:", socket.id);

  /* --- ルームを作成する --- */
  socket.on("createRoom", () => {
    let id = makeRoomId();
    while(rooms[id]) id = makeRoomId();   // かぶらないIDにする
    rooms[id] = { players: [socket.id] };
    socket.join(id);                      // Socket.IO のルーム機能に参加
    socket.data.roomId = id;
    socket.data.role = 1;                 // 部屋を作った人がプレイヤー1
    socket.emit("roomCreated", { roomId: id, role: 1 });
    console.log("ルーム作成:", id);
  });

  /* --- 既存ルームに参加する --- */
  socket.on("joinRoom", (roomId) => {
    roomId = String(roomId || "").toUpperCase().trim();
    const room = rooms[roomId];
    if(!room){ socket.emit("joinError", "ルームが見つかりません"); return; }
    if(room.players.length >= 2){ socket.emit("joinError", "そのルームは満員です"); return; }

    room.players.push(socket.id);
    socket.join(roomId);
    socket.data.roomId = roomId;
    socket.data.role = 2;                 // 後から入った人がプレイヤー2
    socket.emit("roomJoined", { roomId, role: 2 });

    // 2人そろったので、両者に「開始準備OK」を通知してカウントダウン開始
    io.to(roomId).emit("bothReady");
    startCountdown(roomId);
    console.log("ルーム参加:", roomId);
  });

  /* --- 自分の状態（位置・スコア・ライフ）を相手に中継する ---
     ※ 最小構成では「中継」だけ。重要判定をサーバーで持たせたい場合は
        ここでスコアを検証・保存するように拡張できます（README参照）。 */
  socket.on("state", (data) => {
    const roomId = socket.data.roomId;
    if(roomId) socket.to(roomId).emit("opponentState", data);
  });

  /* --- 切断したとき --- */
  socket.on("disconnect", () => {
    const roomId = socket.data.roomId;
    if(roomId && rooms[roomId]){
      socket.to(roomId).emit("opponentLeft"); // 相手に切断を知らせる
      delete rooms[roomId];                    // 部屋を片付ける
      console.log("ルーム解散:", roomId);
    }
  });
});

/* 3,2,1,START のカウントダウンを両プレイヤーに送る */
function startCountdown(roomId){
  let n = 3;
  io.to(roomId).emit("countdown", n);
  const timer = setInterval(() => {
    n--;
    if(n > 0){
      io.to(roomId).emit("countdown", n);
    } else {
      io.to(roomId).emit("countdown", 0);          // 0 = START 表示
      clearInterval(timer);
      io.to(roomId).emit("matchStart", { duration: 60 }); // 60秒勝負
    }
  }, 1000);
}

const PORT = process.env.PORT || 3000;
server.listen(PORT, () => {
  console.log("サーバー起動: http://localhost:" + PORT);
});
